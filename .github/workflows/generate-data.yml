name: Generate Timetable Data

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/generate-data.yml"
      - "generate-data.mjs"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:
  schedule:
    - cron: "1 0 * * 0"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Generate data
        run: npm run generate

      - name: Create or update data pull request
        id: create-pr
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN || github.token }}
          add-paths: |
            data/
          branch: bot/update-timetable-data
          delete-branch: true
          base: main
          title: Update timetable data
          commit-message: Update timetable data
          body: |
            Automated timetable data refresh.

            - generated by the `Generate Timetable Data` workflow
            - safe to auto-merge after required checks pass
          author: GitHub Action <action@github.com>
          committer: GitHub Action <action@github.com>

      - name: Enable pull request auto-merge
        if: ${{ steps.create-pr.outputs.pull-request-operation == 'created' || steps.create-pr.outputs.pull-request-operation == 'updated' }}
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN || github.token }}
        run: gh pr merge --auto --squash --delete-branch "${{ steps.create-pr.outputs.pull-request-number }}"
