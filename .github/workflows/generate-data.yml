name: Generate Timetable Data

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/generate-data.yml"
      - "generate-data.mjs"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:
  schedule:
    - cron: "1 0 * * 0"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  generate-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ssh-key: ${{ secrets.DATA_PUSH_SSH_KEY }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Generate data
        run: npm run generate

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git remote set-url origin git@github.com:hacker30083/tt.git
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update timetable data"
            git push origin HEAD:main
          fi
